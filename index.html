<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIRE — BLN24 BD Intelligence</title>
<style>
  :root {
    --black: #0d0d0d;
    --dark: #141414;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --gold: #C9A84C;
    --gold-dim: #8a6f2e;
    --white: #f5f5f5;
    --muted: #666;
    --green: #27ae60;
    --red: #e74c3c;
    --blue: #2980b9;
    --purple: #8e44ad;
    --orange: #e67e22;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
  }

  /* AUTH */
  #auth {
    position: fixed; inset: 0;
    background: var(--black);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    flex-direction: column;
    gap: 40px;
  }
  #auth.hidden { display: none; }

  .auth-logo {
    font-size: 3.5rem;
    font-weight: 800;
    letter-spacing: -2px;
    color: var(--white);
  }
  .auth-logo span { color: var(--gold); }

  .auth-tagline {
    font-size: .85rem;
    color: var(--muted);
    letter-spacing: .15em;
    text-transform: uppercase;
  }

  .auth-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 360px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .auth-box label {
    font-size: .75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  .auth-box select, .auth-box input {
    width: 100%;
    padding: 12px 16px;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-size: .9rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  .auth-box select:focus, .auth-box input:focus { border-color: var(--gold); }
  .auth-box select option { background: var(--dark); }

  .auth-btn {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: var(--black);
    border: none;
    border-radius: 8px;
    font-size: .9rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: .05em;
    transition: opacity .2s;
  }
  .auth-btn:hover { opacity: .9; }

  .auth-err { color: var(--red); font-size: .75rem; min-height: 18px; }

  /* APP */
  #app { display: none; }
  #app.visible { display: block; }

  /* TOPBAR */
  .topbar {
    height: 56px;
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 24px;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }
  .topbar-logo {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--white);
  }
  .topbar-logo span { color: var(--gold); }

  .topbar-role {
    background: var(--border);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .role-ceo { background: rgba(201,168,76,.15); color: var(--gold); }
  .role-am { background: rgba(39,174,96,.15); color: var(--green); }
  .role-sme { background: rgba(41,128,185,.15); color: var(--blue); }

  .topbar-user { font-size: .8rem; color: var(--muted); margin-left: auto; }

  .topbar-notify {
    width: 32px; height: 32px;
    background: var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: .8rem;
    position: relative;
  }
  .notify-badge {
    position: absolute;
    top: -2px; right: -2px;
    width: 14px; height: 14px;
    background: var(--red);
    border-radius: 50%;
    font-size: .55rem;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }

  /* SIDEBAR */
  .layout { display: flex; padding-top: 56px; min-height: 100vh; }

  .sidebar {
    width: 220px;
    background: var(--dark);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: fixed;
    top: 56px; bottom: 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 0 16px;
    margin-bottom: 8px;
  }
  .sidebar-label {
    font-size: .62rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .12em;
    margin-bottom: 6px;
    padding: 0 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: .82rem;
    color: var(--muted);
    transition: all .15s;
    text-decoration: none;
  }
  .nav-item:hover { background: var(--border); color: var(--white); }
  .nav-item.active { background: rgba(201,168,76,.12); color: var(--gold); }
  .nav-item .icon { font-size: .95rem; width: 18px; text-align: center; }
  .nav-badge {
    margin-left: auto;
    background: var(--red);
    color: #fff;
    font-size: .6rem;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
  }
  .nav-badge.gold { background: var(--gold); color: var(--black); }

  /* MAIN */
  .main {
    margin-left: 220px;
    padding: 32px;
    flex: 1;
  }

  .page { display: none; }
  .page.active { display: block; }

  /* PAGE HEADERS */
  .page-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .page-title {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -.5px;
  }
  .page-sub { font-size: .8rem; color: var(--muted); margin-top: 2px; }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .card-title { font-size: .85rem; font-weight: 700; }

  /* STATS ROW */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .stat-val { font-size: 1.8rem; font-weight: 800; }
  .stat-lbl { font-size: .72rem; color: var(--muted); margin-top: 2px; }
  .stat-sub { font-size: .75rem; color: var(--green); margin-top: 4px; }

  /* PIPELINE */
  .pipeline-stages {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    overflow-x: auto;
  }
  .stage-col {
    min-width: 200px;
    flex: 1;
    border-right: 1px solid var(--border);
    padding: 0 12px 12px;
  }
  .stage-col:last-child { border-right: none; }
  .stage-hdr {
    font-size: .65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    padding: 10px 0 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stage-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .stage-count {
    margin-left: auto;
    font-size: .65rem;
    background: var(--border);
    padding: 2px 6px;
    border-radius: 10px;
  }

  .opp-card {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .opp-card:hover { border-color: var(--gold-dim); }
  .opp-agency { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .opp-title { font-size: .78rem; font-weight: 600; margin: 3px 0; line-height: 1.3; }
  .opp-meta { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .badge {
    font-size: .6rem;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
  }
  .b-gold { background: rgba(201,168,76,.15); color: var(--gold); }
  .b-green { background: rgba(39,174,96,.15); color: var(--green); }
  .b-red { background: rgba(231,76,60,.15); color: var(--red); }
  .b-blue { background: rgba(41,128,185,.15); color: var(--blue); }
  .b-purple { background: rgba(142,68,173,.15); color: var(--purple); }
  .b-orange { background: rgba(230,126,34,.15); color: var(--orange); }
  .b-gray { background: var(--border); color: var(--muted); }

  /* OPP DETAIL MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    display: none;
    align-items: flex-start;
    justify-content: flex-end;
    padding-top: 56px;
  }
  .modal-overlay.open { display: flex; }

  .modal-panel {
    width: 520px;
    height: calc(100vh - 56px);
    background: var(--dark);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .modal-hdr {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--dark);
    z-index: 1;
  }
  .modal-agency { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
  .modal-title { font-size: 1rem; font-weight: 700; margin: 4px 0 8px; line-height: 1.3; }
  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    background: none; border: none;
    color: var(--muted); font-size: 1.1rem;
    cursor: pointer;
  }

  .modal-body { padding: 20px 24px; flex: 1; }

  .modal-section { margin-bottom: 20px; }
  .modal-section-title {
    font-size: .68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .modal-text { font-size: .82rem; line-height: 1.6; color: #ccc; }

  .input-field {
    width: 100%;
    background: var(--black);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--white);
    font-size: .82rem;
    font-family: inherit;
    outline: none;
    resize: vertical;
    transition: border-color .2s;
    margin-top: 6px;
  }
  .input-field:focus { border-color: var(--gold); }

  .action-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .btn {
    padding: 9px 18px;
    border-radius: 7px;
    font-size: .78rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-gold { background: var(--gold); color: var(--black); }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--white); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-sm { padding: 6px 12px; font-size: .72rem; }

  /* SUBMIT OPP FORM */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: .75rem; color: var(--muted); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--white);
    font-size: .85rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  .form-input:focus { border-color: var(--gold); }
  .form-select {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--white);
    font-size: .85rem;
    font-family: inherit;
    outline: none;
  }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: .8rem;
  }
  .empty-icon { font-size: 2rem; margin-bottom: 8px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab-btn {
    padding: 7px 16px;
    border-radius: 7px;
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    font-family: inherit;
    transition: all .15s;
  }
  .tab-btn.active { background: var(--gold); color: var(--black); border-color: var(--gold); }

  /* WIRE MARK */
  .wire-mark {
    position: fixed;
    bottom: 16px; right: 16px;
    font-size: .65rem;
    color: var(--border);
    letter-spacing: .1em;
    text-transform: uppercase;
  }
</style>
</head>

<script>
// ─────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────
const USERS = {

  hayk:    { name: 'Hayk',         role: 'am',   pass: 'wire2026', label: 'Account Manager' },
  michael: { name: 'Michael',      role: 'am',   pass: 'wire2026', label: 'Account Manager' },

  sme:     { name: 'SME',          role: 'sme',  pass: 'wire2026', label: 'SME / Reviewer' },
};

// Sample opportunity pipeline
const OPPS = [
  {
    id: 1, stage: 0, agency: 'DEA', title: 'Web Developer / Content Services',
    value: 'TBD', set_aside: '8(a)', score: 102, source: 'HigherGov',
    ref: 'RFI1807179', due: null,
    ai_analysis: 'Strong fit. MBDA.gov Drupal prime is direct analog. No confirmed incumbent for DEA web/content. 8(a) eligible — BLN24 can prime directly. DHA DoD comms experience maps well to restricted federal communications environment.',
    ai_win_theme: 'BLN24 is the only 8(a) firm with active Drupal development at Department of Commerce scale (MBDA.gov, 60,000+ pages) AND federal content management at 100M+ audience scale (CMS MNPS). We are the only firm that can honestly say: we already do what DEA needs, at greater scale, right now.',

  {

    ai_win_theme: 'Incumbent advantage. BLN24 built and maintains the ADRM system. We know the data architecture, the stakeholders, and the mission. No competitor can match 4 years of Census institutional knowledge.',
    brian_win_theme: 'We ARE the incumbent. This is ours to lose. Eric needs to be on this by EOW.',
    assigned_to: 'eric', stage_name: 'CEO Review',
    competitors: ['AFS (current sub)', 'Guidehouse', 'Booz Allen'],
  },
  {
    id: 3, stage: 3, agency: 'HHS/CMS', title: 'QMARS III Quality Management',
    value: '$12M', set_aside: '8(a)', score: 74, source: 'Employee Submission',
    ref: 'RFQ TBD', due: '2026-07-01',

  {

    assigned_to: 'michael', stage_name: 'Brian Go/No-Go',
    competitors: ['None expected if sole source'],
  },
];

let currentUser = null;
let currentOpp = null;
let currentPage = 'pipeline';

// ─────────────────────────────────────────────────────────────────
// AUTH
// ─────────────────────────────────────────────────────────────────
function doAuth() {
  const userKey = document.getElementById('auth-user').value;
  const pass = document.getElementById('auth-pass').value;
  const err = document.getElementById('auth-err');
  if (!userKey) { err.textContent = 'Select your name.'; return; }
  const user = USERS[userKey];
  if (!user || pass !== user.pass) { err.textContent = 'Incorrect access code.'; return; }
  currentUser = { key: userKey, ...user };
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  document.getElementById('topbar-user').textContent = currentUser.name;
  const badge = document.getElementById('role-badge');
  badge.textContent = currentUser.label;
  badge.className = 'topbar-role role-' + currentUser.role;
  buildNav();
  showPage('pipeline');
}

function signOut() {
  currentUser = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth').classList.remove('hidden');
  document.getElementById('auth-pass').value = '';
  document.getElementById('auth-err').textContent = '';
}

// ─────────────────────────────────────────────────────────────────
// NAV
// ─────────────────────────────────────────────────────────────────

  const sidebar = document.getElementById('sidebar');
  const isCEO = currentUser.role === 'ceo';
  const isAM = currentUser.role === 'am';
  const isSME = currentUser.role === 'sme';

  const myQueue = OPPS.filter(o => o.assigned_to === currentUser.key).length;
  const aiDiscover = OPPS.filter(o => o.stage === 0 || o.stage === 1).length;

  const ceoNav = `
    <div class="sidebar-section">
      <div class="sidebar-label">Command</div>
      <a class="nav-item active" onclick="showPage('pipeline')" id="nav-pipeline">
        <span class="icon">⚡</span> Pipeline
        <span class="nav-badge gold">${OPPS.length}</span>
      </a>
      <a class="nav-item" onclick="showPage('discover')" id="nav-discover">
        <span class="icon">🔍</span> AI Discovery
        <span class="nav-badge">${aiDiscover}</span>
      </a>
      <a class="nav-item" onclick="showPage('submit')" id="nav-submit">
        <span class="icon">➕</span> Submit Opp

function showPage(page) {
  currentPage = page;
  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-' + page);
  if (nav) nav.classList.add('active');
  // Render page
  const main = document.getElementById('main-content');
  main.innerHTML = PAGES[page] ? PAGES[page]() : `<div class="card"><p style="color:var(--muted)">Page coming soon.</p></div>`;
}

function openOpp(id) {
  const opp = OPPS.find(o => o.id === id);
  if (!opp) return;
  currentOpp = opp;
  const stage = STAGES[opp.stage];
  const isCEO = currentUser.role === 'ceo';

  document.getElementById('modal-agency').textContent = opp.agency;
  document.getElementById('modal-title').textContent = opp.title;
  document.getElementById('modal-badges').innerHTML = `
    <span class="badge b-gold">${opp.score}pts</span>
    <span class="badge" style="background:rgba(${hexToRgb(stage.color)},.2);color:${stage.color}">${stage.short}</span>
    <span class="badge b-gray">${opp.set_aside}</span>
    ${opp.value !== 'TBD' ? `<span class="badge b-green">${opp.value}</span>` : ''}
    ${opp.source === 'Employee Submission' ? `<span class="badge b-purple">Employee Submission</span>` : ''}
  `;

  let body = `
    <div class="modal-section">
      <div class="modal-section-title">AI Analysis</div>
      <div class="modal-text">${opp.ai_analysis}</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">🤖 AI Win Theme</div>
      <div class="modal-text" style="border-left:3px solid var(--purple);padding-left:12px;font-style:italic">${opp.ai_win_theme}</div>
    </div>`;

  if (opp.brian_win_theme) {
    body += `
    <div class="modal-section">
      <div class="modal-section-title">👤 Brian's Win Theme</div>
      <div class="modal-text" style="border-left:3px solid var(--gold);padding-left:12px;font-style:italic">${opp.brian_win_theme}</div>
    </div>`;
  }

  if (opp.competitors) {
    body += `
    <div class="modal-section">
      <div class="modal-section-title">⚔️ Expected Competitors</div>
      <div class="modal-text">${opp.competitors.join(' · ')}</div>
    </div>`;
  }

  // CEO actions
  if (isCEO) {
    body += `<hr class="divider">
    <div class="modal-section">
      <div class="modal-section-title">Your Win Theme (optional — override or add to AI's)</div>
      <textarea class="input-field" id="ceo-theme" rows="3" placeholder="Add your strategic framing here...">${opp.brian_win_theme || ''}</textarea>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Assign To</div>
      <select class="input-field" id="assign-to" style="resize:none">
        <option value="">Select account manager...</option>
        <option value="hayk" ${opp.assigned_to==='hayk'?'selected':''}>Hayk</option>
        <option value="michael" ${opp.assigned_to==='michael'?'selected':''}>Michael</option>
        <option value="gabe" ${opp.assigned_to==='gabe'?'selected':''}>Gabe</option>
        <option value="eric" ${opp.assigned_to==='eric'?'selected':''}>Eric</option>
      </select>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Challenge AI (optional)</div>
      <textarea class="input-field" id="ceo-challenge" rows="2" placeholder="What did AI get wrong or miss?"></textarea>
    </div>
    <div class="action-row">
      <button class="btn btn-gold" onclick="ceoApprove()">✓ Approve & Assign</button>
      <button class="btn btn-red" onclick="ceoPass()">✕ Pass</button>
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
    </div>
    <div id="modal-msg" style="margin-top:8px;font-size:.78rem;color:var(--green)"></div>`;
  }

  // AM actions
  if (currentUser.role === 'am' && opp.assigned_to === currentUser.key) {
    body += `<hr class="divider">
    <div class="modal-section">
      <div class="modal-section-title">Your Capture Strategy</div>
      <textarea class="input-field" id="am-strategy" rows="3" placeholder="Agree with AI win theme, or write your own approach..."></textarea>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Prompt AI to Improve (optional)</div>
      <textarea class="input-field" id="am-prompt" rows="2" placeholder="e.g. 'The agency relationship angle is stronger than the tech angle. Reweight the win theme.'"></textarea>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Tag SME for Technical Review</div>
      <select class="input-field" id="sme-tag" style="resize:none">
        <option value="">Select SME...</option>
        <option value="favi">Favi Villa — UX / HCD</option>
        <option value="drupal">Drupal Engineer (TBD)</option>
        <option value="data">Data Engineer (TBD)</option>
        <option value="comms">Comms Lead (TBD)</option>
      </select>
    </div>
    <div class="action-row">
      <button class="btn btn-gold" onclick="amSubmit()">Submit Strategy</button>
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
    </div>
    <div id="modal-msg" style="margin-top:8px;font-size:.78rem;color:var(--green)"></div>`;
  }

  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('opp-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('opp-modal').classList.remove('open');
  currentOpp = null;
}

function ceoApprove() {
  const theme = document.getElementById('ceo-theme')?.value;
  const assignTo = document.getElementById('assign-to')?.value;
  if (!assignTo) { document.getElementById('modal-msg').textContent = 'Please assign to someone first.'; return; }
  if (currentOpp) {
    currentOpp.brian_win_theme = theme || currentOpp.brian_win_theme;
    currentOpp.assigned_to = assignTo;
    currentOpp.stage = Math.max(currentOpp.stage, 2);
  }
  document.getElementById('modal-msg').textContent = `✓ Approved and assigned to ${assignTo}. They'll be notified.`;
}

function ceoPass() {
  if (currentOpp) currentOpp.stage = -1;
  document.getElementById('modal-msg').textContent = '✕ Passed. Removed from pipeline.';
  setTimeout(closeModal, 1500);
}

function amSubmit() {
  const strategy = document.getElementById('am-strategy')?.value;
  const prompt = document.getElementById('am-prompt')?.value;
  const sme = document.getElementById('sme-tag')?.value;
  document.getElementById('modal-msg').textContent = `✓ Strategy submitted. ${sme ? `${sme} tagged for SME review.` : ''} Brian can see your input.`;
}

function submitOpp() {
  const agency = document.getElementById('sub-agency')?.value;
  const title = document.getElementById('sub-title')?.value;
  const why = document.getElementById('sub-why')?.value;
  if (!agency || !title || !why) {
    document.getElementById('submit-msg').textContent = 'Agency, title, and rationale are required.';
    document.getElementById('submit-msg').style.color = 'var(--red)';
    return;
  }
  const newOpp = {
    id: OPPS.length + 1,
    stage: 0,
    agency: agency,
    title: title,
    value: document.getElementById('sub-value')?.value || 'TBD',
    set_aside: document.getElementById('sub-setaside')?.value || 'Unknown',
    score: 0,
    source: 'Employee Submission',
    ref: document.getElementById('sub-ref')?.value || '',
    due: null,
    ai_analysis: '⏳ AI analysis in progress...',
    ai_win_theme: '⏳ Generating win theme...',
    brian_win_theme: null,
    assigned_to: null,
    stage_name: 'AI Discovery',
    submitted_by: currentUser.name,
    why_pursue: why,
  };
  OPPS.push(newOpp);
  document.getElementById('submit-msg').style.color = 'var(--green)';
  document.getElementById('submit-msg').textContent = `✓ Submitted. AI is analyzing now. Brian will see it in his review queue.`;
  setTimeout(() => showPage('pipeline'), 2000);
}

// ─────────────────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}
