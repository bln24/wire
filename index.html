<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIRE — BLN24 BD Intelligence</title>
<style>
:root {
  --black: #080808;
  --surface: #111;
  --card: #161616;
  --border: #222;
  --gold: #C9A84C;
  --gold-glow: rgba(201,168,76,.18);
  --gold-dim: rgba(201,168,76,.06);
  --white: #F2F2F2;
  --muted: #555;
  --faint: #2a2a2a;
  --green: #2ecc71;
  --red: #e74c3c;
  --blue: #3498db;
  --purple: #9b59b6;
  --orange: #e67e22;
  --teal: #1abc9c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: var(--black);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── GRAIN OVERLAY ─────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9998;
  opacity: .4;
}

/* ── AUTH ──────────────────────────────────────────────────── */
#auth {
  position: fixed; inset: 0;
  background: var(--black);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  gap: 48px;
  z-index: 9999;
}
#auth.hidden { display: none; }

.auth-hero {
  text-align: center;
}

.wire-wordmark {
  font-size: 5rem;
  font-weight: 900;
  letter-spacing: -4px;
  line-height: 1;
  background: linear-gradient(135deg, #fff 0%, var(--gold) 50%, #fff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.wire-infinity {
  font-size: 5rem;
  font-weight: 200;
  letter-spacing: -4px;
  background: linear-gradient(135deg, var(--gold) 0%, #fff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.auth-sub {
  font-size: .72rem;
  color: var(--muted);
  letter-spacing: .3em;
  text-transform: uppercase;
  margin-top: 10px;
}

.auth-form {
  width: 340px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.auth-select, .auth-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  color: var(--white);
  font-size: .88rem;
  font-family: inherit;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
}
.auth-select:focus, .auth-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-glow);
}
.auth-select option { background: #1a1a1a; }

.auth-btn {
  width: 100%;
  padding: 15px;
  background: var(--gold);
  color: #000;
  border: none;
  border-radius: 10px;
  font-size: .9rem;
  font-weight: 800;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: .05em;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.auth-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 60%);
}
.auth-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(201,168,76,.3); }
.auth-err { color: var(--red); font-size: .75rem; min-height: 18px; text-align: center; }

/* ── APP SHELL ─────────────────────────────────────────────── */
#app { display: none; }
#app.visible { display: block; }

/* ── TOP BAR ───────────────────────────────────────────────── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: rgba(8,8,8,.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 100;
}

.topbar-wordmark {
  font-size: 1.1rem;
  font-weight: 900;
  letter-spacing: -1px;
  background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  flex-shrink: 0;
}

.topbar-pill {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: .62rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  flex-shrink: 0;
}
.pill-ceo { background: rgba(201,168,76,.15); color: var(--gold); border: 1px solid rgba(201,168,76,.3); }
.pill-am { background: rgba(46,204,113,.1); color: var(--green); border: 1px solid rgba(46,204,113,.25); }
.pill-sme { background: rgba(52,152,219,.1); color: var(--blue); border: 1px solid rgba(52,152,219,.25); }

.topbar-spacer { flex: 1; }

.topbar-username { font-size: .78rem; color: var(--muted); }

.topbar-icon-btn {
  width: 34px; height: 34px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: .85rem;
  transition: all .15s;
  position: relative;
}
.topbar-icon-btn:hover { background: var(--faint); border-color: var(--gold-dim); }

.notif-dot {
  position: absolute;
  top: 4px; right: 4px;
  width: 7px; height: 7px;
  background: var(--red);
  border-radius: 50%;
  border: 1px solid var(--black);
}

.signout-btn {
  padding: 6px 14px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--muted);
  font-size: .72rem;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.signout-btn:hover { color: var(--white); border-color: var(--faint); }

/* ── LAYOUT ────────────────────────────────────────────────── */
.layout {
  display: flex;
  padding-top: 52px;
  min-height: 100vh;
}

/* ── SIDEBAR ───────────────────────────────────────────────── */
.sidebar {
  width: 200px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: fixed;
  top: 52px; bottom: 0;
  overflow-y: auto;
  flex-shrink: 0;
}

.nav-section { padding: 0 12px; margin-bottom: 6px; }
.nav-section-label {
  font-size: .58rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .14em;
  padding: 0 8px;
  margin-bottom: 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: .8rem;
  color: var(--muted);
  transition: all .15s;
  position: relative;
}
.nav-item:hover { color: var(--white); background: var(--faint); }
.nav-item.active {
  color: var(--gold);
  background: var(--gold-dim);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 16px;
  background: var(--gold);
  border-radius: 0 3px 3px 0;
}

.nav-icon { font-size: .8rem; width: 16px; text-align: center; flex-shrink: 0; }
.nav-badge {
  margin-left: auto;
  font-size: .6rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  background: var(--red);
  color: #fff;
  min-width: 18px;
  text-align: center;
}
.nav-badge.g { background: rgba(201,168,76,.2); color: var(--gold); }

/* ── MAIN ──────────────────────────────────────────────────── */
.main {
  margin-left: 200px;
  flex: 1;
  padding: 28px 32px 100px;
  min-width: 0;
}

/* ── PAGE HEADER ───────────────────────────────────────────── */
.page-hdr {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 28px;
  gap: 16px;
}
.page-title {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -.7px;
  line-height: 1.1;
}
.page-sub { font-size: .78rem; color: var(--muted); margin-top: 4px; }

/* ── STAT GRID ─────────────────────────────────────────────── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s;
}
.stat-card:hover { border-color: var(--gold-glow); }
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-glow), transparent);
}
.stat-val {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1;
}
.stat-lbl { font-size: .7rem; color: var(--muted); margin-top: 4px; }
.stat-trend { font-size: .72rem; margin-top: 6px; }

/* ── PIPELINE ──────────────────────────────────────────────── */
.pipeline-header {
  font-size: .65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.pipeline-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.pipeline-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.stage-column {
  min-width: 190px;
  flex-shrink: 0;
}

.stage-label {
  font-size: .6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.stage-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.stage-count-badge {
  margin-left: auto;
  font-size: .6rem;
  color: var(--muted);
}

/* ── OPP CARDS ─────────────────────────────────────────────── */
.opp-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.opp-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: transparent;
  transition: background .2s;
}
.opp-card:hover {
  border-color: rgba(201,168,76,.3);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
}
.opp-card:hover::before { background: var(--gold); }

.opp-agency {
  font-size: .6rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 3px;
}
.opp-name {
  font-size: .78rem;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 8px;
}

.score-ring-container {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}
.score-ring {
  width: 32px; height: 32px;
  flex-shrink: 0;
}
.score-ring-bg { fill: none; stroke: var(--faint); stroke-width: 3; }
.score-ring-fill { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset .4s; }

.opp-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 6px;
}
.tag {
  font-size: .58rem;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 600;
}
.t-gold { background: rgba(201,168,76,.12); color: var(--gold); }
.t-green { background: rgba(46,204,113,.1); color: var(--green); }
.t-blue { background: rgba(52,152,219,.1); color: var(--blue); }
.t-purple { background: rgba(155,89,182,.1); color: var(--purple); }
.t-red { background: rgba(231,76,60,.1); color: var(--red); }
.t-dim { background: var(--faint); color: var(--muted); }

/* ── BUTTONS ───────────────────────────────────────────────── */
.btn {
  padding: 9px 18px;
  border-radius: 8px;
  font-size: .78rem;
  font-weight: 700;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: all .15s;
  letter-spacing: .02em;
}
.btn:hover { opacity: .88; transform: translateY(-1px); }
.btn-gold { background: var(--gold); color: #000; }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--white); }
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }
.btn-green { background: var(--green); color: #000; }
.btn-red { background: var(--red); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: .7rem; }
.btn-ghost { background: none; border: none; color: var(--muted); cursor: pointer; font-family: inherit; font-size: .75rem; }
.btn-ghost:hover { color: var(--white); }

/* ── SLIDE PANEL ───────────────────────────────────────────── */
.panel-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  display: none;
  backdrop-filter: blur(4px);
}
.panel-overlay.open { display: block; }

.slide-panel {
  position: fixed;
  top: 52px; right: 0; bottom: 0;
  width: 480px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 201;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.slide-panel.open { transform: translateX(0); }

.panel-hdr {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
}
.panel-close {
  position: absolute; top: 18px; right: 18px;
  background: var(--faint);
  border: none; cursor: pointer;
  color: var(--muted);
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem;
  transition: all .15s;
}
.panel-close:hover { color: var(--white); background: var(--border); }

.panel-agency { font-size: .62rem; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; }
.panel-title { font-size: 1rem; font-weight: 700; margin: 5px 0 8px; line-height: 1.3; }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
}

.panel-section { margin-bottom: 20px; }
.panel-section-title {
  font-size: .6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--gold);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.panel-text {
  font-size: .82rem;
  line-height: 1.7;
  color: #bbb;
}

.win-theme-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid;
  border-radius: 8px;
  padding: 12px 14px;
  font-size: .82rem;
  line-height: 1.6;
  color: #ccc;
  font-style: italic;
}

.panel-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--white);
  font-size: .82rem;
  font-family: inherit;
  outline: none;
  resize: vertical;
  transition: border-color .2s, box-shadow .2s;
  margin-top: 6px;
}
.panel-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-glow);
}

.panel-select {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--white);
  font-size: .82rem;
  font-family: inherit;
  outline: none;
  margin-top: 6px;
}

.panel-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  background: var(--surface);
}

.msg-box {
  margin-top: 10px;
  font-size: .78rem;
  padding: 8px 12px;
  border-radius: 6px;
  display: none;
}
.msg-box.ok { display: block; background: rgba(46,204,113,.1); color: var(--green); }
.msg-box.err { display: block; background: rgba(231,76,60,.1); color: var(--red); }

/* ── COMMAND BAR (CEO only) ────────────────────────────────── */
.command-bar {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(22,22,22,.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 24px;
  z-index: 99;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.cb-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.cb-val { font-size: .95rem; font-weight: 800; letter-spacing: -.5px; }
.cb-lbl { font-size: .55rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
.cb-div { width: 1px; height: 24px; background: var(--border); }
.cb-pulse {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
  50% { opacity: .5; box-shadow: 0 0 16px var(--green); }
}

/* ── FORM ──────────────────────────────────────────────────── */
.form-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  max-width: 580px;
}
.form-title { font-size: 1rem; font-weight: 700; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: .72rem; color: var(--muted); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .08em; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 14px;
  color: var(--white);
  font-size: .85rem;
  font-family: inherit;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-glow);
}
.form-textarea { resize: vertical; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.form-actions { display: flex; gap: 8px; margin-top: 20px; }
.form-msg { margin-top: 10px; font-size: .78rem; }
.form-msg.ok { color: var(--green); }
.form-msg.err { color: var(--red); }

/* ── MISC ──────────────────────────────────────────────────── */
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}
.empty-icon { font-size: 2.2rem; margin-bottom: 12px; }
.empty-title { font-size: .9rem; font-weight: 700; color: var(--white); margin-bottom: 6px; }
.empty-sub { font-size: .78rem; line-height: 1.5; }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 14px;
}
.card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-size: .82rem; font-weight: 700; }

/* scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
</style>
</head>
<body>

<!-- ── AUTH ─────────────────────────────────────────────────── -->
<div id="auth">
  <div class="auth-hero">
    <div>
      <span class="wire-wordmark">W</span><span class="wire-infinity">∞</span><span class="wire-wordmark">RE</span>
    </div>
    <div class="auth-sub">BLN24 · BD Intelligence Engine</div>
  </div>
  <div class="auth-form">
    <select class="auth-select" id="auth-user">
      <option value="">Select your name...</option>
      <option value="brian">Brian Nguyen — CEO</option>
      <option value="hayk">Hayk — Account Manager</option>
      <option value="michael">Michael — Account Manager</option>
      <option value="gabe">Gabe — Account Manager</option>
      <option value="eric">Eric Ma — BD</option>
      <option value="favi">Favi Villa — UX Lead / SME</option>
    </select>

// SCORE RING SVG
// ─────────────────────────────────────────────────────────────────
function scoreRing(score, max, color) {
  const r = 12, cx = 16, cy = 16;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(score / max, 1);
  const offset = circ * (1 - pct);
  return `<svg class="score-ring" viewBox="0 0 32 32">
    <circle class="score-ring-bg" cx="${cx}" cy="${cy}" r="${r}" stroke-dasharray="${circ}" />
    <circle class="score-ring-fill" cx="${cx}" cy="${cy}" r="${r}"
      stroke="${color || '#C9A84C'}"
      stroke-dasharray="${circ}"
      stroke-dashoffset="${offset}"
      transform="rotate(-90 ${cx} ${cy})" />
    <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" fill="${color||'#C9A84C'}" font-size="7" font-weight="800" font-family="-apple-system,sans-serif">${score}</text>
  </svg>`;
}

      { name:'Eric Ma', role:'BD / WIRE Manager', note:'Assigned: Census ADRM' },
      { name:'Favi Villa', role:'UX Lead / SME', note:'Available for HCD reviews' },
    ];
    return `<div class="page-hdr">
      <div><div class="page-title">Team</div>
      <div class="page-sub">BLN24 capture and proposal team</div></div>
    </div>
    <div class="card">
      ${members.map((m,i) => `
      <div style="display:flex;align-items:center;gap:14px;padding:12px 0;${i<members.length-1?'border-bottom:1px solid var(--border)':''}">
        <div style="width:38px;height:38px;background:var(--faint);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0">${m.name[0]}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:.85rem">${m.name}</div>
          <div style="font-size:.72rem;color:var(--muted)">${m.role}</div>
        </div>
        <div style="font-size:.72rem;color:var(--muted)">${m.note}</div>
      </div>`).join('')}
    </div>`;
  },
};

// ─────────────────────────────────────────────────────────────────
// OPP PANEL
// ─────────────────────────────────────────────────────────────────
function openOpp(id) {
  const o = OPPS.find(x => x.id === id);
  if (!o) return;
  G.opp = o;
  const stage = STAGES[o.stage];
  const isCEO = G.user.role === 'ceo';
  const isOwner = G.user.key === o.assigned_to;

  document.getElementById('panel-agency').textContent = o.agency;
  document.getElementById('panel-title').textContent = o.title;
  document.getElementById('panel-tags').innerHTML = [
    `<span class="tag t-gold">${o.score}pts</span>`,
    `<span class="tag" style="background:rgba(${hexRgb(stage.color)},.12);color:${stage.color}">${stage.short}</span>`,
    `<span class="tag t-dim">${o.set_aside}</span>`,
    o.value !== 'TBD' ? `<span class="tag t-green">${o.value}</span>` : '',
    o.source === 'Employee Submission' ? `<span class="tag t-purple">Submitted by ${o.submitted_by}</span>` : '',
  ].join('');

  let body = `
    <div class="panel-section">
      <div class="panel-section-title">🤖 AI Analysis</div>
      <div class="panel-text">${o.ai_analysis}</div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">🤖 AI Win Theme</div>
      <div class="win-theme-box" style="border-left-color:var(--purple)">${o.ai_win_theme}</div>
    </div>`;

  if (o.brian_win_theme) {
    body += `<div class="panel-section">
      <div class="panel-section-title">👤 Brian's Win Theme</div>
      <div class="win-theme-box" style="border-left-color:var(--gold)">${o.brian_win_theme}</div>
    </div>`;
  }

  if (o.competitors?.length) {
    body += `<div class="panel-section">
      <div class="panel-section-title">⚔️ Expected Competitors</div>
      <div class="panel-text">${o.competitors.map(c=>`• ${c}`).join('<br>')}</div>
    </div>`;
  }

  // CEO controls
  let footer = '';
  if (isCEO) {
    body += `<hr class="divider">
    <div class="panel-section">
      <div class="panel-section-title">Your Win Theme</div>
      <textarea class="panel-input" id="p-theme" rows="3" placeholder="Override or add to AI's theme...">${o.brian_win_theme || ''}</textarea>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Assign To</div>
      <select class="panel-select" id="p-assign">
        <option value="">Select account manager...</option>
        ${['hayk','michael','gabe','eric'].map(k=>`<option value="${k}" ${o.assigned_to===k?'selected':''}>${USERS[k].name}</option>`).join('')}
      </select>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Challenge AI (optional)</div>
      <textarea class="panel-input" id="p-challenge" rows="2" placeholder="What did AI get wrong or miss?"></textarea>
    </div>
    <div class="msg-box" id="p-msg"></div>`;
    footer = `<button class="btn btn-gold" onclick="ceoApprove()">✓ Approve & Assign</button>
      <button class="btn btn-red" onclick="ceoPass()">✕ Pass</button>
      <button class="btn btn-ghost" onclick="closePanel()">Close</button>`;
  }

  if (!isCEO && isOwner) {
    body += `<hr class="divider">
    <div class="panel-section">
      <div class="panel-section-title">Your Capture Strategy</div>
      <textarea class="panel-input" id="p-strategy" rows="3" placeholder="Agree with win theme above, or write your own approach..."></textarea>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Prompt AI to Improve</div>
      <textarea class="panel-input" id="p-prompt" rows="2" placeholder="e.g. 'The sole source angle is stronger. Reweight the win theme around the relationship.'"></textarea>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Tag Technical SME</div>
      <select class="panel-select" id="p-sme">
        <option value="">Select SME (optional)...</option>
        ${SMES.map(s=>`<option value="${s}">${s}</option>`).join('')}
      </select>
    </div>
    <div class="msg-box" id="p-msg"></div>`;
    footer = `<button class="btn btn-gold" onclick="amSubmit()">Submit Strategy</button>
      <button class="btn btn-ghost" onclick="closePanel()">Close</button>`;
  }

  if (!footer) footer = `<button class="btn btn-outline" onclick="closePanel()">Close</button>`;

  document.getElementById('panel-body').innerHTML = body;
  document.getElementById('panel-footer').innerHTML = footer;
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('slide-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('slide-panel').classList.remove('open');
  G.opp = null;
}

function ceoApprove() {
  const theme = document.getElementById('p-theme')?.value;
  const assignTo = document.getElementById('p-assign')?.value;
  const msg = document.getElementById('p-msg');
  if (!assignTo) { showMsg(msg,'Select someone to assign to.','err'); return; }
  if (G.opp) {
    G.opp.brian_win_theme = theme || G.opp.brian_win_theme;
    G.opp.assigned_to = assignTo;
    G.opp.stage = Math.max(G.opp.stage, 2);
  }
  showMsg(msg, `✓ Approved and assigned to ${USERS[assignTo]?.name || assignTo}. They will be notified.`, 'ok');
}

function ceoPass() {
  if (G.opp) G.opp.stage = -1;
  showMsg(document.getElementById('p-msg'), '✕ Passed. Removed from active pipeline.', 'ok');
  setTimeout(closePanel, 1500);
}

function amSubmit() {
  const sme = document.getElementById('p-sme')?.value;
  showMsg(document.getElementById('p-msg'),
    `✓ Strategy submitted. ${sme ? `${sme} has been tagged.` : ''} Brian can see your input now.`, 'ok');
}

function submitOpp() {
  const agency = document.getElementById('s-agency')?.value?.trim();
  const title = document.getElementById('s-title')?.value?.trim();
  const why = document.getElementById('s-why')?.value?.trim();
  const msg = document.getElementById('s-msg');
  if (!agency || !title || !why) { showMsg(msg,'Agency, title, and rationale are required.','err'); return; }
  OPPS.push({
    id: OPPS.length + 1, stage: 0, agency, title,
    value: document.getElementById('s-value')?.value || 'TBD',
    set_aside: document.getElementById('s-setaside')?.value || 'Unknown',
    score: 0, source: 'Employee Submission',
    ref: document.getElementById('s-ref')?.value || '',
    ai_analysis: '⏳ AI analysis running...',
    ai_win_theme: '⏳ Generating win theme...',
    brian_win_theme: null, assigned_to: null,
    competitors: [], submitted_by: G.user.name,
  });
  showMsg(msg, '✓ Submitted. AI is analyzing now. Brian will see it in his review queue.', 'ok');
  setTimeout(() => nav('pipeline'), 2000);
}

function showMsg(el, text, type) {
  if (!el) return;
  el.textContent = text;
  el.className = 'msg-box ' + type;
}

function hexRgb(hex) {
  if (!hex || !hex.startsWith('#')) return '0,0,0';
  const r = parseInt(hex.slice(1,3),16)||0;
  const g = parseInt(hex.slice(3,5),16)||0;
  const b = parseInt(hex.slice(5,7),16)||0;
  return `${r},${g},${b}`;
}
